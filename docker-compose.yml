services:
  db:
    image: postgres:17-alpine
    container_name: cyberlearn_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-cyberlearn}
    volumes:
      - /media/devmon/HDD/data_postgres:/var/lib/postgresql/data
    networks:
      - cyberlearn_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cyberlearn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/${IMAGE_NAME:-cyberlearn/cyberlearn}:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyberlearn_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-cyberlearn}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@cyberlearn.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234!}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cyberlearn_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    container_name: cyberlearn_nginx
    restart: unless-stopped
    ports:
      - "18080:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - cyberlearn_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  nginx_cache:

networks:
  cyberlearn_net:
    name: cyberlearn_net
    driver: bridge
