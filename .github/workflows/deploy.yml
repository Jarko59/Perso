name: Deploy to Production (Self-Hosted)

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── 1. Build & Push Docker image (Cloud) ─────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 2. Deploy (On-Premise via Runner) ───────────────────────────
  deploy:
    name: Deploy to Local Server
    runs-on: self-hosted  # <--- CRITICAL: Runs directly on your machine
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create working directory
        run: mkdir -p ~/cyberlearn

      - name: Setup environment and deploy
        run: |
          cd ~/cyberlearn
          
          # Write .env from secrets
          cat > .env << EOF
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_HOST=db
          DB_PORT=5432
          GITHUB_REPOSITORY=${{ github.repository }}
          EOF

          # Login to GHCR (using repo token or secret if needed)
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Pull and Restart
          docker compose pull app
          docker compose up -d --remove-orphans

          # Health check
          echo "Waiting for app to start..."
          sleep 15
          curl -sf http://localhost:3000/api/health | grep '"status":"ok"' || exit 1
          
          echo "✅ Deployment successful on $(date)"
