name: Verify Code

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Linting check
      run: npm run lint

    - name: Build check (Docker)
      run: docker build . -t cyberlearn-build-test
