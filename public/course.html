<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cours — CyberLearn</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .course-header {
      padding: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .course-header-inner {
      max-width: 1280px; margin: 0 auto;
      display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap;
    }
    .course-big-icon { font-size: 4rem; line-height: 1; }
    .module-content-area { max-width: 820px; }
    table { width:100%; border-collapse:collapse; margin:1rem 0; }
    td, th { border:1px solid var(--border); padding:0.625rem 0.875rem; font-size:0.875rem; }
    th { background:rgba(0,212,255,0.08); color:var(--cyan); font-weight:600; text-align:left; }
    blockquote { border-left:3px solid var(--cyan); padding:.75rem 1rem; background:var(--cyan-dim); border-radius:0 var(--radius-sm) var(--radius-sm) 0; margin:1rem 0; }
    blockquote p { margin:0; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">🛡️ Cyber<span>Learn</span></a>
    <div class="navbar-links">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/courses.html" class="active">Cours</a>
      <a href="/profile.html">Profil</a>
    </div>
    <div class="navbar-actions">
      <a href="/profile.html" class="navbar-user">
        <div class="avatar" id="navAvatar">?</div>
        <span id="navUsername" style="font-size:.875rem;font-weight:600"></span>
      </a>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Déconnexion</button>
    </div>
  </nav>

  <!-- Course header -->
  <div class="course-header" id="courseHeader" style="display:none">
    <div class="course-header-inner">
      <div class="course-big-icon" id="headerIcon"></div>
      <div style="flex:1">
        <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.25rem" id="headerCat"></div>
        <h1 style="font-size:1.75rem;margin-bottom:0.5rem" id="headerTitle"></h1>
        <p id="headerDesc"></p>
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:1rem">
          <span class="badge badge-cyan" id="headerDuration"></span>
          <span class="badge badge-purple" id="headerXP"></span>
          <span class="badge" id="headerDiff" style="background:var(--bg-tertiary);color:var(--text-secondary)"></span>
        </div>
        <div style="margin-top:1rem">
          <div class="progress-bar-wrap" style="max-width:300px">
            <div class="progress-bar-fill" id="headerProgress" style="width:0%"></div>
          </div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.375rem" id="headerProgressLabel"></div>
        </div>
      </div>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" id="bookmarkBtn" onclick="toggleBookmark()">🔖 Favoris</button>
        <a id="quizBtn" class="btn btn-primary btn-sm" href="#">🎯 Faire le quiz</a>
      </div>
    </div>
  </div>

  <div class="layout-sidebar">
    <!-- Sidebar: module list -->
    <div class="sidebar" id="sidebar">
      <div style="font-size:0.8rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem">Modules</div>
      <div class="module-list" id="moduleList">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Main: module content -->
    <div class="main-content" id="mainContent">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>

  <div id="toastContainer" id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script>
    const sanitizeHTML = (str) => window.DOMPurify ? DOMPurify.sanitize(str) : str;

    let course = null, modules = [], currentModuleIdx = 0, courseId = null;

    async function init() {
      const r = await fetch('/api/auth/me');
      if (!r.ok) { window.location = '/login.html'; return; }
      const { user } = await r.json();
      document.getElementById('navUsername').textContent = user.username;
      document.getElementById('navAvatar').textContent   = user.username[0].toUpperCase();

      const params = new URLSearchParams(window.location.search);
      courseId = params.get('id');
      if (!courseId) { window.location = '/courses.html'; return; }

      const cr = await fetch(`/api/courses/${courseId}`);
      if (!cr.ok) { window.location = '/courses.html'; return; }
      const data = await cr.json();
      course  = data.course;
      modules = data.modules;

      renderHeader();
      renderSidebar();
      if (modules.length) loadModule(0);
    }

    function renderHeader() {
      document.getElementById('courseHeader').style.display = '';
      document.getElementById('headerIcon').textContent = course.icon;
      document.getElementById('headerCat').textContent  = course.category_icon + ' ' + course.category_name;
      document.getElementById('headerTitle').textContent = course.title;
      document.getElementById('headerDesc').textContent  = course.description;
      document.getElementById('headerDuration').textContent = '⏱ ' + course.duration_min + ' min';
      document.getElementById('headerXP').textContent   = '⚡ ' + course.xp_reward + ' XP';
      document.getElementById('headerDiff').textContent  = course.difficulty;
      document.getElementById('quizBtn').href = `/quiz.html?id=${courseId}`;

      const done  = modules.filter(m => m.completed).length;
      const pct   = modules.length ? Math.round(done / modules.length * 100) : 0;
      document.getElementById('headerProgress').style.width = pct + '%';
      document.getElementById('headerProgressLabel').textContent = `${done}/${modules.length} modules complétés`;
    }

    function renderSidebar() {
      const list = document.getElementById('moduleList');
      list.innerHTML = modules.map((m, i) => `
        <div class="module-item ${i === currentModuleIdx ? 'active' : ''}" id="mod-${i}" onclick="loadModule(${i})">
          <div class="module-check ${m.completed ? 'done' : ''}">
            ${m.completed ? '✓' : (i + 1)}
          </div>
          <span style="flex:1;font-size:0.8rem">${sanitizeHTML(m.title)}</span>
          ${m.xp_reward ? `<span style="font-size:0.7rem;color:var(--text-muted)">+${m.xp_reward}xp</span>` : ''}
        </div>
      `).join('');
    }

    function loadModule(idx) {
      currentModuleIdx = idx;
      const mod   = modules[idx];
      const main  = document.getElementById('mainContent');

      document.querySelectorAll('.module-item').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
      });

      main.innerHTML = `
        <div class="module-content-area">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
            <div>
              <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.25rem">Module ${idx+1} / ${modules.length}</div>
              <h2 style="font-size:1.4rem">${sanitizeHTML(mod.title)}</h2>
            </div>
            <div style="display:flex;gap:0.75rem;align-items:center">
              ${idx > 0 ? `<button class="btn btn-secondary btn-sm" onclick="loadModule(${idx-1})">← Précédent</button>` : ''}
              ${!mod.completed ? `<button class="btn btn-primary" id="completeBtn" onclick="markComplete(${mod.id})">✅ Marquer complété (+${mod.xp_reward} XP)</button>` : '<span class="badge badge-beginner">✅ Complété</span>'}
              ${idx < modules.length-1 ? `<button class="btn btn-secondary btn-sm" onclick="loadModule(${idx+1})">Suivant →</button>` : ''}
            </div>
          </div>
          
          ${mod.docker_image ? `
            <div class="sandbox-box" style="margin-bottom:2rem;padding:1.5rem;background:rgba(124,58,237,0.1);border:1px solid var(--purple-light);border-radius:var(--radius-md)">
              <h3 style="margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem">💻 Machine Cible Isolé</h3>
              <p style="font-size:0.9rem;margin-bottom:1rem;color:var(--text-secondary)">Ce module nécessite la compromission d'une cible. Démarrez votre environnement Sandbox privé.</p>
              ${mod.active_instance ? `
                <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;background:rgba(0,0,0,0.5);padding:1rem;border-radius:var(--radius-sm)">
                  <div>
                    <div style="font-size:0.8rem;color:var(--green);font-weight:600;margin-bottom:0.25rem">🟢 Machine En Ligne</div>
                    <code style="font-size:1rem;user-select:all" id="instanceUrl">http://EXOTIC-IP:${mod.active_instance.port}</code>
                  </div>
                  <div style="display:flex;align-items:center;gap:1rem">
                    <div style="text-align:right">
                      <div style="font-size:0.75rem;color:var(--text-muted)">Temps restant</div>
                      <div style="font-family:var(--font-mono);font-weight:600;color:var(--orange)" id="activeTimer">--:--</div>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="stopMachine(${mod.id})">Arrêter</button>
                  </div>
                </div>
              ` : `
                <button class="btn btn-secondary" id="spawnBtn" onclick="spawnMachine(${mod.id})">🚀 Démarrer l'instance Docker</button>
              `}
            </div>
          ` : ''}

          <div class="card md" id="mdContent" style="line-height:1.9">
            ${renderMarkdown(mod.content)}
          </div>
          ${mod.has_flag ? `
            <div class="ctf-box" style="margin-top:2rem;padding:1.5rem;background:rgba(14,165,233,0.1);border:1px solid var(--cyan);border-radius:var(--radius-md)">
              <h3 style="margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem">🚩 Challenge CTF <span class="badge badge-cyan" style="font-size:0.7rem">+${mod.flag_xp || 50} XP</span></h3>
              <p style="font-size:0.9rem;margin-bottom:1rem;color:var(--text-secondary)">Prouve que tu as compromis la cible en entrant le flag (format <code>CTF{...}</code>).</p>
              ${mod.flag_solved 
                ? `<div style="color:var(--green);font-weight:600;padding:0.75rem;background:rgba(34,197,94,0.1);border-radius:4px;border:1px solid var(--green)">✅ Flag validé : tu as gagné ${mod.flag_xp || 50} XP !</div>`
                : `<div style="display:flex;gap:0.5rem">
                    <input type="text" id="flagInput" class="form-input" placeholder="CTF{...}" style="flex:1" onkeydown="if(event.key==='Enter') submitFlag(${mod.id})">
                    <button class="btn btn-primary" id="flagBtn" onclick="submitFlag(${mod.id})">Valider</button>
                  </div>`
              }
            </div>
          ` : ''}
          <div style="margin-top:1.5rem;display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem">
            ${idx > 0 ? `<button class="btn btn-secondary" onclick="loadModule(${idx-1})">← Module précédent</button>` : '<div></div>'}
            ${idx < modules.length-1
              ? `<button class="btn btn-primary" onclick="loadModule(${idx+1})">Module suivant →</button>`
              : `<a href="/quiz.html?id=${courseId}" class="btn btn-primary">🎯 Faire le quiz du cours →</a>`
            }
          </div>
        </div>
      `;
    }

    async function markComplete(moduleId) {
      const btn = document.getElementById('completeBtn');
      if (btn) { btn.disabled = true; btn.textContent = '...'; }

      const r = await fetch(`/api/courses/${courseId}/progress`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ moduleId }),
      });
      if (r.ok) {
        modules[currentModuleIdx].completed = true;
        renderSidebar();
        renderHeader();
        loadModule(currentModuleIdx);
        showToast('✅ Module complété ! XP gagné.', 'success');
      } else {
        if (btn) { btn.disabled = false; btn.textContent = '✅ Marquer complété'; }
        showToast('Erreur', 'error');
      }
    }

    async function submitFlag(moduleId) {
      const input = document.getElementById('flagInput');
      const btn = document.getElementById('flagBtn');
      if (!input || !input.value.trim()) return;

      btn.disabled = true;
      btn.textContent = '...';

      try {
        const r = await fetch(`/api/courses/${courseId}/modules/${moduleId}/flag`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ flag: input.value.trim() }),
        });
        const data = await r.json();

        if (!r.ok) {
          showToast(data.error || 'Erreur', 'error');
          btn.disabled = false;
          btn.textContent = 'Valider';
          return;
        }

        modules[currentModuleIdx].flag_solved = true;
        showToast(data.message, 'success');
        renderSidebar();
        renderHeader();
        loadModule(currentModuleIdx);
      } catch (e) {
        showToast('Erreur réseau', 'error');
        btn.disabled = false;
        btn.textContent = 'Valider';
      }
    }

    async function spawnMachine(moduleId) {
      const btn = document.getElementById('spawnBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Démarrage... (Patientez)'; }
      try {
        const r = await fetch(`/api/courses/${courseId}/modules/${moduleId}/spawn`, { method: 'POST' });
        const data = await r.json();
        if (!r.ok) {
          showToast(data.error || 'Erreur', 'error');
          if (btn) { btn.disabled = false; btn.textContent = '🚀 Démarrer l\\\'instance Docker'; }
          return;
        }
        showToast('Machine démarrée !', 'success');
        init();
      } catch (e) {
        showToast('Erreur API', 'error');
        if (btn) { btn.disabled = false; btn.textContent = '🚀 Démarrer l\\\'instance Docker'; }
      }
    }

    async function stopMachine(moduleId) {
      try {
        const r = await fetch(`/api/courses/${courseId}/modules/${moduleId}/stop`, { method: 'POST' });
        if (r.ok) {
          showToast('Machine détruite avec succès.', 'info');
          init();
        }
      } catch (e) {}
    }

    let timerInterval;
    function updateTimers() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        const mod = modules[currentModuleIdx];
        if (mod && mod.active_instance) {
          const el = document.getElementById('activeTimer');
          if (!el) return;
          const rem = Math.max(0, new Date(mod.active_instance.expires_at) - new Date());
          if (rem <= 0) {
            el.textContent = "Expirée";
            el.style.color = "var(--red)";
            return;
          }
          const m = Math.floor(rem / 60000);
          const s = Math.floor((rem % 60000) / 1000);
          el.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
          
          const urlEl = document.getElementById('instanceUrl');
          if (urlEl && urlEl.textContent.includes('EXOTIC-IP')) {
            urlEl.textContent = `http://${window.location.hostname}:${mod.active_instance.port}`;
          }
        }
      }, 1000);
    }

    async function toggleBookmark() {
      const r = await fetch(`/api/courses/${courseId}/bookmark`, { method: 'POST' });
      if (r.ok) {
        const d = await r.json();
        showToast(d.bookmarked ? '🔖 Ajouté aux favoris' : '🗑️ Retiré des favoris', 'info');
      }
    }

    function renderMarkdown(text) {
      const rawHtml = text
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        .replace(/```[\w]*\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
        .replace(/\| (.+) \|/g, m => '<tr>' + m.split('|').filter(Boolean).map(c => `<td>${c.trim()}</td>`).join('') + '</tr>')
        .replace(/(<tr>.*<\/tr>)/gs, '<table>$1</table>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/^(?!<[a-z])(.+)$/gm, (m, p) => p ? `<p>${p}</p>` : '');
      return sanitizeHTML(rawHtml);
    }

    function showToast(msg, type='info') {
      let tc = document.getElementById('toast-container');
      if (!tc) { tc = document.createElement('div'); tc.id='toast-container'; document.body.appendChild(tc); }
      const t = document.createElement('div');
      t.className = `toast ${type}`; t.textContent = msg;
      tc.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location = '/login.html';
    }

    init();
  </script>
</body>
</html>
