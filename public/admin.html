<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration — CyberLearn</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">🛡️ Cyber<span>Learn</span></a>
    <div class="navbar-links">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/courses.html">Cours</a>
      <a href="/admin.html" class="active">Admin</a>
    </div>
    <div class="navbar-actions">
      <button class="btn btn-ghost btn-sm" onclick="logout()">Déconnexion</button>
    </div>
  </nav>

  <div class="container" style="padding-top:2rem;padding-bottom:3rem">
    <div class="admin-header">
      ⚠️ <strong>Panneau d'administration</strong> — Accès restreint aux administrateurs.
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <h1 style="font-size:1.75rem">Administration</h1>
      <div class="badge badge-beginner font-mono" id="adminBadge">...</div>
    </div>

    <!-- Stats row -->
    <div class="grid-4" style="margin-bottom:2rem">
      <div class="stat-card"><div class="stat-label">Utilisateurs</div><div class="stat-value text-cyan" id="aUsers">—</div></div>
      <div class="stat-card"><div class="stat-label">Cours</div><div class="stat-value" style="color:var(--purple-light)" id="aCourses">—</div></div>
      <div class="stat-card"><div class="stat-label">Modules</div><div class="stat-value" style="color:var(--orange)" id="aModules">—</div></div>
      <div class="stat-card"><div class="stat-label">Quiz</div><div class="stat-value" style="color:var(--green)" id="aQuiz">—</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('users',this)">👥 Utilisateurs</button>
      <button class="tab-btn" onclick="showTab('courses',this)">📚 Cours</button>
    </div>

    <!-- Users tab -->
    <div class="tab-panel active" id="tab-users">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Utilisateur</th><th>Email</th><th>Rôle</th>
              <th>XP</th><th>Quiz</th><th>Inscrit le</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTable">
            <tr><td colspan="8" style="text-align:center;padding:2rem"><div class="spinner" style="margin:auto"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Courses tab -->
    <div class="tab-panel" id="tab-courses">
      <div style="margin-bottom:1rem">
        <button class="btn btn-primary btn-sm" onclick="showCreateCourse()">+ Créer un cours</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>Titre</th><th>Catégorie</th><th>Difficulté</th><th>XP</th><th>Publié</th><th>Actions</th></tr>
          </thead>
          <tbody id="coursesTable">
            <tr><td colspan="7" style="text-align:center;padding:2rem"><div class="spinner" style="margin:auto"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Create course modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Créer un cours</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <form id="createCourseForm">
        <div class="form-group">
          <label class="form-label">Titre</label>
          <input class="form-input" type="text" id="cTitle" required>
        </div>
        <div class="form-group">
          <label class="form-label">Slug (URL)</label>
          <input class="form-input" type="text" id="cSlug" required placeholder="mon-cours">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-input" id="cDesc" rows="3" required style="resize:vertical"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group">
            <label class="form-label">Difficulté</label>
            <select class="form-input" id="cDiff">
              <option value="beginner">Débutant</option>
              <option value="intermediate">Intermédiaire</option>
              <option value="advanced">Avancé</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">XP récompense</label>
            <input class="form-input" type="number" id="cXp" value="100" min="10">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group">
            <label class="form-label">Icône (emoji)</label>
            <input class="form-input" type="text" id="cIcon" value="🛡️" maxlength="4">
          </div>
          <div class="form-group">
            <label class="form-label">Durée (min)</label>
            <input class="form-input" type="number" id="cDur" value="30" min="5">
          </div>
        </div>
        <div id="createCourseAlert"></div>
        <button type="submit" class="btn btn-primary w-full">Créer le cours</button>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script>
    const sanitizeHTML = (str) => window.DOMPurify ? DOMPurify.sanitize(str) : str;
    async function init() {
      const r = await fetch('/api/auth/me');
      if (!r.ok) { window.location = '/login.html'; return; }
      const { user } = await r.json();
      if (user.role !== 'admin') { window.location = '/dashboard.html'; return; }
      document.getElementById('adminBadge').textContent = '👑 ' + user.username;

      loadUsers();
      loadCourses();
    }

    async function loadUsers() {
      const r = await fetch('/api/users/all');
      if (!r.ok) return;
      const { users } = await r.json();
      document.getElementById('aUsers').textContent = users.length;

      document.getElementById('usersTable').innerHTML = users.map(u => `
        <tr>
          <td class="font-mono text-muted">#${u.id}</td>
          <td><strong>${sanitizeHTML(u.username)}</strong></td>
          <td style="color:var(--text-muted)">${sanitizeHTML(u.email)}</td>
          <td>
            <select class="form-input" style="padding:.25rem .5rem;font-size:.8rem;width:auto"
              onchange="changeRole(${u.id}, this.value)">
              <option value="user" ${u.role==='user'?'selected':''}>user</option>
              <option value="admin" ${u.role==='admin'?'selected':''}>admin</option>
            </select>
          </td>
          <td class="font-mono text-cyan">${u.xp}</td>
          <td>${u.quiz_count}</td>
          <td style="color:var(--text-muted);font-size:.8rem">${new Date(u.created_at).toLocaleDateString('fr-FR')}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id},'${sanitizeHTML(u.username).replace(/'/g, "\\'")}')">Supprimer</button>
          </td>
        </tr>
      `).join('');
    }

    async function loadCourses() {
      const r = await fetch('/api/courses');
      if (!r.ok) return;
      const { courses } = await r.json();
      document.getElementById('aCourses').textContent = courses.length;
      document.getElementById('aModules').textContent = courses.reduce((s,c) => s + c.total_modules, 0);
      document.getElementById('aQuiz').textContent = courses.length * 5;

      document.getElementById('coursesTable').innerHTML = courses.map(c => `
        <tr>
          <td class="font-mono text-muted">#${c.id}</td>
          <td><strong>${sanitizeHTML(c.icon)} ${sanitizeHTML(c.title)}</strong></td>
          <td style="color:var(--text-muted)">${sanitizeHTML(c.category_name)}</td>
          <td><span class="badge badge-${c.difficulty}">${c.difficulty}</span></td>
          <td class="font-mono text-cyan">⚡${c.xp_reward}</td>
          <td>${c.published ? '<span class="badge badge-beginner">✅ Oui</span>' : '<span class="badge" style="background:var(--red-dim);color:var(--red)">❌ Non</span>'}</td>
          <td>
            <button class="btn btn-secondary btn-sm" onclick="togglePublish(${c.id},${c.published})">
              ${c.published ? 'Dépublier' : 'Publier'}
            </button>
            <button class="btn btn-danger btn-sm" onclick="deleteCourse(${c.id},'${sanitizeHTML(c.title).replace(/'/g, "\\'")}')">Supprimer</button>
          </td>
        </tr>
      `).join('');
    }

    async function changeRole(id, role) {
      await fetch(`/api/users/${id}/role`, {
        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({role})
      });
      showToast(`Rôle mis à jour → ${role}`, 'success');
    }

    async function deleteUser(id, name) {
      if (!confirm(`Supprimer l'utilisateur "${name}" ? Cette action est irréversible.`)) return;
      const r = await fetch(`/api/users/${id}`, { method:'DELETE' });
      if (r.ok) { showToast('Utilisateur supprimé', 'success'); loadUsers(); }
      else { const d=await r.json(); showToast(d.error,'error'); }
    }

    async function deleteCourse(id, title) {
      if (!confirm(`Supprimer le cours "${title}" ? Cette action est irréversible.`)) return;
      const r = await fetch(`/api/courses/${id}`, { method:'DELETE' });
      if (r.ok) { showToast('Cours supprimé', 'success'); loadCourses(); }
    }

    async function togglePublish(id, published) {
      await fetch(`/api/courses/${id}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ published: published ? 0 : 1 })
      });
      showToast('Statut mis à jour', 'success');
      loadCourses();
    }

    function showCreateCourse() {
      document.getElementById('createModal').classList.add('open');
    }
    function closeModal() {
      document.getElementById('createModal').classList.remove('open');
    }

    document.getElementById('cTitle').addEventListener('input', e => {
      document.getElementById('cSlug').value = e.target.value.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    });

    document.getElementById('createCourseForm').addEventListener('submit', async e => {
      e.preventDefault();
      const alertEl = document.getElementById('createCourseAlert');
      alertEl.innerHTML = '';
      const r = await fetch('/api/courses', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          title:        document.getElementById('cTitle').value,
          slug:         document.getElementById('cSlug').value,
          description:  document.getElementById('cDesc').value,
          difficulty:   document.getElementById('cDiff').value,
          xp_reward:    parseInt(document.getElementById('cXp').value),
          duration_min: parseInt(document.getElementById('cDur').value),
          icon:         document.getElementById('cIcon').value,
          category_id:  1,
        }),
      });
      if (r.ok) {
        showToast('Cours créé !', 'success');
        closeModal();
        loadCourses();
        document.getElementById('createCourseForm').reset();
      } else {
        const d = await r.json();
        alertEl.innerHTML = `<div class="alert alert-error mb-2">⚠️ ${d.error}</div>`;
      }
    });

    function showTab(name, el) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }

    function showToast(msg, type='info') {
      const tc = document.getElementById('toast-container');
      const t  = document.createElement('div');
      t.className = `toast ${type}`; t.textContent = msg;
      tc.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    async function logout() {
      await fetch('/api/auth/logout', { method:'POST' });
      window.location = '/login.html';
    }

    init();
  </script>
</body>
</html>
